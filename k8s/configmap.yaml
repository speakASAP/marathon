apiVersion: v1
kind: ConfigMap
metadata:
  name: marathon-config
  namespace: statex-apps
  labels:
    app: marathon
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "marathon"
  DOMAIN: "marathon.alfares.cz"
  PORT: "3000"
  # Add environment variables from .env that are non-sensitive (no secrets, API keys, passwords)
  # Examples:
  # DATABASE_POOL_SIZE: "10"
  # LOG_LEVEL: "info"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "marathon"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  LOGGING_SERVICE_API_PATH: "/api/logs"
  LOGGING_SERVICE_TIMEOUT: "5000"
  NOTIFICATION_SERVICE_URL: "http://notifications-microservice.statex-apps.svc.cluster.local:3368"
  NOTIFICATION_SERVICE_TIMEOUT: "5000"
  NOTIFICATION_RETRY_MAX_ATTEMPTS: "3"
  NOTIFICATION_RETRY_DELAY_MS: "1000"
